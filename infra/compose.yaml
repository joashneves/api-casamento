services:
  database:
    container_name: "postgres-dev"
    image: "postgres:17.2-alpine3.21"
    env_file:
      - ../.env.development
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d casamento"]
      interval: 5s
      timeout: 5s
      retries: 5
      
  web:
    container_name: "flask-api-web"
    build:
      context: .. # Build from the api-casamento directory
      dockerfile: Dockerfile # Specify the Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ..:/app # Mount the api-casamento directory into the container
    environment:
      - DATABASE_URL=postgresql://admin:admin@database:5432/casamento
    env_file:
      - ../.env
      - ../.env.development
    depends_on:
      database:
        condition: service_healthy
    command: python app.py

volumes:
  pg_data:
